services:
  # База данных PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: digital-twin-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - process-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  opcua-server:
    build:
      context: .
      dockerfile: opcua-server/Dockerfile
    container_name: opcua-server
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "${OPCUA_SERVER_PORT}:4840"
    volumes:
      - ./config.json:/app/config.json
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - process-network
    restart: unless-stopped

  model:
    build:
      context: .
      dockerfile: model/Dockerfile
    container_name: process-model
    depends_on:
      database:
        condition: service_healthy
      opcua-server:
        condition: service_started
    volumes:
      - ./config.json:/app/config.json
      - ./database/database_manager.py:/app/database_manager.py
      - ./telegram:/app/telegram
      - telegram_data:/app/data
    environment:
      - OPCUA_SERVER_URL=${OPCUA_SERVER_ENDPOINT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - process-network
    restart: unless-stopped

  controller-primary:
    build:
      context: .
      dockerfile: controller/Dockerfile
    container_name: pid-controller-primary
    depends_on:
      database:
        condition: service_healthy
      opcua-server:
        condition: service_started
    volumes:
      - ./config.json:/app/config.json
      - ./database/database_manager.py:/app/database_manager.py
    environment:
      - OPCUA_SERVER_URL=${OPCUA_SERVER_ENDPOINT}
      - CONTROLLER_MODE=${CONTROLLER_MODE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - process-network
    restart: unless-stopped
    command: [ "python", "universal_controller.py" ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('opcua-server', ${OPCUA_SERVER_PORT})); s.close()" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  controller-backup:
    build:
      context: .
      dockerfile: controller/Dockerfile
    container_name: pid-controller-backup
    depends_on:
      database:
        condition: service_healthy
      opcua-server:
        condition: service_started
      controller-primary:
        condition: service_started
    volumes:
      - ./config.json:/app/config.json
      - ./database/database_manager.py:/app/database_manager.py
    environment:
      - OPCUA_SERVER_URL=${OPCUA_SERVER_ENDPOINT}
      - CONTROLLER_MODE=${CONTROLLER_BACKUP_MODE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - process-network
    restart: unless-stopped
    command: [ "python", "universal_controller.py" ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('opcua-server', ${OPCUA_SERVER_PORT})); s.close()" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  controller-watchdog-service:
    build: ./controller-watchdog-service
    container_name: controller-watchdog-service
    depends_on:
      database:
        condition: service_healthy
      opcua-server:
        condition: service_started
      controller-primary:
        condition: service_started
      controller-backup:
        condition: service_started
    volumes:
      - ./config.json:/app/config.json
      - ./telegram:/app/telegram
      - telegram_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - OPCUA_SERVER_URL=${OPCUA_SERVER_ENDPOINT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - process-network
    restart: unless-stopped
    user: "0:0" # Запуск от root для доступа к Docker socket

  watchdog-system-service:
    build: ./watchdog-system-service
    container_name: watchdog-system-service
    depends_on:
      - controller-watchdog-service
    volumes:
      - ./telegram:/app/telegram
      - telegram_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - process-network
    restart: unless-stopped
    user: "0:0" # Запуск от root для доступа к Docker socket

  analytics:
    build: ./analytics
    container_name: analytics-service
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "${ANALYTICS_PORT}:8080"
    volumes:
      - ./database/database_manager.py:/app/database_manager.py
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ANALYTICS_PORT=${ANALYTICS_PORT}
      - ANALYTICS_HOST=${ANALYTICS_HOST}
    networks:
      - process-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${ANALYTICS_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  telegram-bot:
    build: ./telegram
    container_name: telegram-notification-bot
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - telegram_data:/app/data
      - ./config.json:/app/config.json
      - ./database/database_manager.py:/app/database_manager.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CONNECT_TIMEOUT=${TELEGRAM_CONNECT_TIMEOUT:-30}
      - TELEGRAM_READ_TIMEOUT=${TELEGRAM_READ_TIMEOUT:-30}
      - TELEGRAM_WRITE_TIMEOUT=${TELEGRAM_WRITE_TIMEOUT:-30}
      - TELEGRAM_POOL_TIMEOUT=${TELEGRAM_POOL_TIMEOUT:-10}
      - TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - LOGGING_LEVEL=${LOGGING_LEVEL}
      - DEBUG_MODE=${DEBUG_MODE}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL}
    networks:
      - process-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import os; exit(0 if os.getenv('TELEGRAM_BOT_TOKEN') else 1)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  process-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  telegram_data:
    driver: local
